    <style>
        :root { --dorado: #bca080; --dorado-suave: rgba(188, 160, 128, 0.3); --oscuro: #1a1a1a; --crema: #fdfcf9; }
        body { margin: 0; background: #eee; font-family: 'Tenor Sans', sans-serif; overflow-x: hidden; }
        
        /* WRAPPER CON BORDE DORADO ELEGANTE */
        .wrapper { 
            max-width: 480px; 
            margin: 0 auto; 
            background: var(--crema); 
            position: relative; 
            box-shadow: 0 0 60px rgba(0,0,0,0.15); 
            overflow: hidden; 
            border: 1px solid var(--dorado-suave); /* Borde de enmarcado */
        }
        
        /* ADORNOS FLORALES IMPONENTES (GRANDES) */
        .adorno-sup { 
            position: absolute; 
            z-index: 10; 
            pointer-events: none; 
            width: 450px; /* Tamaño imponente */
            top: -80px;   /* Ajuste negativo para abrazar la esquina */
            left: -80px; 
            opacity: 0.9;
        }
        .adorno-inf { 
            position: absolute;

            opacity: 0.9;
        }
        
        /* SEPARADORES MAJESTUOSOS */
        .separador {
